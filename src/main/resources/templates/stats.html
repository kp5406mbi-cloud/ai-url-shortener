<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>URL Statistics</title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
            rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-info text-white">

            <h2>
                URL Statistics
            </h2>

        </div>

        <div class="card-body">

            <table class="table table-bordered">

                <tr>
                    <th>Original URL</th>
                    <td th:text="${stats.originalUrl}">
                    </td>
                </tr>

                <tr>
                    <th>Short Code</th>
                    <td th:text="${stats.shortCode}">
                    </td>
                </tr>

                <tr>
                    <th>Click Count</th>
                    <td th:text="${stats.clickCount}">
                    </td>
                </tr>

                <tr>
                    <th>Created At</th>
                    <td th:text="${#temporals.format(stats.createdAt,
'dd MMM yyyy HH:mm')}"></td>
                </tr>

                <tr>
                    <th>Last Accessed At</th>
                    <td th:text="${#temporals.format(stats.lastAccessedAt,
'dd MMM yyyy HH:mm')}"></td>
                </tr>

                <tr>
                    <th>Expires At</th>
                    <td th:text="${#temporals.format(stats.expiresAt,
'dd MMM yyyy HH:mm')}"></td>
                </tr>

            </table>

            <a
                    href="/"
                    class="btn btn-secondary">

                Back

            </a>

        </div>

    </div>

</div>

</body>

</html>
